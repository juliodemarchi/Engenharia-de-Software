<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gym Progress - Engenharia de Software</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 20px; }
        input { margin: 10px; padding: 8px; }
        button { background: #00ff00; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🦾 Gym Progress Tracker</h1>
    <div class="card">
        <form action="/treinar" method="post">
            <input type="text" name="nome" placeholder="Ex: Puxada Frente" required><br>
            <input type="number" name="carga" placeholder="Carga Atual (kg)" step="0.1" required><br>
            <input type="number" name="reps" placeholder="Reps Feitas" required><br>
            <input type="hidden" name="meta_reps" value="12">
            <button type="submit">Registrar e Calcular Progressão</button>
        </form>
    </div>

    <h2>Histórico de Cargas</h2>
    <ul>
        {% for nome, carga in historico.items() %}
            <li><strong>{{ nome }}</strong>: {{ carga }}kg</li>
        {% endfor %}
    </ul>
</body>
</html>
